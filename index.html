<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="주간 루틴">
<title>주간 루틴 트래커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root { --bg:#0f0f11; --surface:#18181c; --surface2:#222228; --border:#2e2e38; --text:#e8e8f0; --text-dim:#6b6b80; --memo-color:#c9b870; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; padding:16px; padding-top:calc(16px + env(safe-area-inset-top)); padding-bottom:calc(40px + env(safe-area-inset-bottom)); }

  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0; padding-bottom:14px; border-bottom:1px solid var(--border); }
  h1 { font-size:15px; font-weight:500; letter-spacing:.05em; color:var(--text-dim); text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:8px; }
  .week-nav { display:flex; align-items:center; gap:6px; }
  .week-label { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-dim); }
  .week-btn { background:none; border:1px solid var(--border); color:var(--text-dim); width:26px; height:26px; border-radius:6px; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .cal-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); height:26px; padding:0 8px; border-radius:6px; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:3px; letter-spacing:.03em; white-space:nowrap; }
  .cal-btn .cal-icon { font-size:13px; line-height:1; }
  .cal-btn .cal-date { font-size:12px; color:var(--text); }

  /* 오늘 달력 메모 미리보기 */
  .today-cal-memo { padding:8px 0 0; margin-bottom:0; }
  .today-cal-memo-text { font-size:12px; color:var(--memo-color); padding:6px 10px; background:rgba(201,184,112,0.08); border-left:2px solid var(--memo-color); border-radius:0 6px 6px 0; line-height:1.4; }

  /* 체크리스트 */
  .checklist-wrap { padding:10px 0 14px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .checklist-items { display:flex; flex-direction:column; gap:4px; margin-bottom:6px; }
  .check-row { display:flex; align-items:center; gap:8px; }
  .check-box { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border); background:transparent; flex-shrink:0; cursor:pointer; appearance:none; -webkit-appearance:none; transition:background .15s, border-color .15s; position:relative; }
  .check-box:checked { background:var(--text-dim); border-color:var(--text-dim); }
  .check-box:checked::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10px; color:var(--bg); }
  .check-label { font-size:13px; color:var(--text); flex:1; cursor:pointer; transition:color .15s; }
  .check-label.done { color:#44445a; text-decoration:line-through; }
  .check-delete { background:none; border:none; color:var(--border); font-size:14px; cursor:pointer; padding:0 2px; line-height:1; flex-shrink:0; }
  .checklist-input-row { display:flex; gap:6px; }
  .checklist-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; padding:6px 10px; outline:none; }
  .checklist-input::placeholder { color:#44445a; }
  .checklist-input:focus { border-color:#44445a; }
  .checklist-add-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; white-space:nowrap; }

  .items { display:flex; flex-direction:column; gap:10px; }
  .item-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .item-header { display:flex; align-items:center; gap:10px; padding:12px 14px 8px; }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .item-name { font-size:14px; font-weight:500; flex:1; }
  .item-time { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-dim); }
  .bar-wrap { margin:4px 14px 8px; background:var(--surface2); border-radius:4px; height:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; transition:width .4s ease; }
  .item-memo { margin:0 14px 8px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-family:'Noto Sans KR',sans-serif; font-size:12px; color:var(--text-dim); width:calc(100% - 28px); outline:none; resize:none; height:32px; line-height:1.4; }
  .item-memo::placeholder { color:#44445a; }
  .item-memo:focus { border-color:#44445a; color:var(--text); }
  .item-meta { display:flex; align-items:center; justify-content:space-between; padding:0 14px 8px; }
  .goal-label { font-size:11px; color:var(--text-dim); }
  .item-actions { display:flex; justify-content:flex-end; align-items:center; gap:6px; padding:0 14px 12px; }
  .timer-live { flex:1; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); display:none; }
  .timer-live.active { display:block; }
  .btn { border:none; border-radius:8px; font-family:'Noto Sans KR',sans-serif; font-size:14px; cursor:pointer; transition:opacity .15s; background:var(--surface2); border:1px solid var(--border); width:38px; height:32px; display:flex; align-items:center; justify-content:center; }
  .btn:active { opacity:.7; }
  .btn-timer { color:var(--text); }
  .btn-timer.running { border-color:currentColor; }
  .btn-add { color:var(--text-dim); font-size:16px; }
  .btn-minus { color:var(--text-dim); font-size:16px; }

  /* 시간 모달 */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:flex-end; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px 16px 0 0; padding:24px 20px 36px; width:100%; max-width:480px; transform:translateY(30px); transition:transform .25s ease; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal h3 { font-size:14px; font-weight:500; margin-bottom:16px; color:var(--text); }
  .modal-inputs { display:flex; gap:8px; align-items:center; margin-bottom:14px; }
  .modal-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Mono',monospace; font-size:16px; padding:10px 12px; text-align:center; width:60px; outline:none; }
  .modal-input:focus { border-color:#555; }
  .modal-sep { color:var(--text-dim); font-size:18px; }
  .modal-btns { display:flex; gap:8px; }
  .btn-confirm { flex:1; padding:10px; border-radius:8px; border:none; background:var(--text); color:var(--bg); font-size:13px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
  .btn-cancel { padding:10px 18px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:13px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }

  /* 달력 모달 */
  .cal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:flex-end; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
  .cal-overlay.open { opacity:1; pointer-events:all; }
  .cal-modal { background:var(--surface); border:1px solid var(--border); border-radius:16px 16px 0 0; padding:20px 16px 36px; width:100%; max-width:480px; transform:translateY(30px); transition:transform .25s ease; touch-action:pan-y; }
  .cal-overlay.open .cal-modal { transform:translateY(0); }
  .cal-header { display:flex; align-items:center; gap:4px; margin-bottom:14px; }
  .cal-nav-btn { background:none; border:1px solid var(--border); color:var(--text-dim); width:28px; height:28px; border-radius:6px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .cal-title { font-size:14px; font-weight:500; color:var(--text); font-family:'DM Mono',monospace; flex:1; text-align:center; }
  .cal-memo-add-btn { background:none; border:1px solid var(--border); color:var(--text-dim); width:28px; height:28px; border-radius:6px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .cal-close { background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; width:28px; height:28px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .cal-day-label { font-size:10px; color:var(--text-dim); text-align:center; padding-bottom:8px; }
  .cal-day-label.holiday { color:#f87171; }
  .cal-cell { text-align:center; padding:3px 1px 2px; border-radius:4px; cursor:pointer; }
  .cal-num { font-size:12px; color:var(--text-dim); line-height:20px; display:flex; align-items:center; justify-content:center; height:20px; border-radius:50%; margin:0 auto; width:20px; }
  .cal-cell.in-week .cal-num { color:var(--text); font-weight:500; background:var(--surface2); border-radius:4px; width:100%; }
  .cal-cell.today .cal-num { background:var(--text); color:var(--bg); font-weight:700; border-radius:50%; width:20px; }
  .cal-cell.holiday .cal-num { color:#f87171; }
  .cal-cell.in-week.holiday .cal-num { color:#f87171; }
  .cal-cell.has-memo .cal-num { color:var(--memo-color); font-weight:700; }
  .cal-cell.in-week.has-memo .cal-num { color:var(--memo-color); }
  .cal-cell.today.has-memo .cal-num { background:var(--memo-color); color:var(--bg); }

  .cal-week-bars { grid-column:1 / -1; display:flex; flex-direction:column; gap:2px; margin:2px 0 6px; padding:0 1px; }
  .cal-bar-row { height:3px; border-radius:2px; background:var(--surface2); overflow:hidden; }
  .cal-bar-fill { height:100%; border-radius:2px; }

  /* 달력 메모 입력 팝업 */
  .cal-memo-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:flex-end; justify-content:center; z-index:200; opacity:0; pointer-events:none; transition:opacity .2s; }
  .cal-memo-overlay.open { opacity:1; pointer-events:all; }
  .cal-memo-modal { background:var(--surface); border:1px solid var(--border); border-radius:16px 16px 0 0; padding:20px 20px 36px; width:100%; max-width:480px; transform:translateY(30px); transition:transform .25s ease; }
  .cal-memo-overlay.open .cal-memo-modal { transform:translateY(0); }
  .cal-memo-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .cal-memo-title { font-size:13px; color:var(--text-dim); font-family:'DM Mono',monospace; }
  .cal-memo-close { background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; }
  .cal-memo-textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:14px; padding:10px 12px; outline:none; resize:none; height:80px; line-height:1.6; margin-bottom:10px; }
  .cal-memo-textarea::placeholder { color:#44445a; }
  .cal-memo-textarea:focus { border-color:#555; }
  .cal-memo-btns { display:flex; gap:8px; }
  .cal-memo-save { flex:1; padding:10px; border-radius:8px; border:none; background:var(--text); color:var(--bg); font-size:13px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
  .cal-memo-del { padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:#f87171; font-size:13px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
  .cal-memo-cancel { padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:13px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }

  .reset-btn { display:block; margin:20px auto 0; background:transparent; border:1px solid var(--border); color:var(--text-dim); font-family:'Noto Sans KR',sans-serif; font-size:12px; padding:8px 20px; border-radius:20px; cursor:pointer; }
</style>
</head>
<body>

<header>
  <h1>주간 루틴</h1>
  <div class="header-right">
    <button class="cal-btn" id="cal-btn" onclick="openCal()"><span class="cal-icon">📅</span><span class="cal-date" id="cal-btn-date"></span></button>
    <div class="week-nav">
      <button class="week-btn" onclick="changeWeek(-1)">‹</button>
      <span class="week-label" id="week-label">이번 주</span>
      <button class="week-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>
</header>

<!-- 오늘 달력 메모 미리보기 -->
<div id="today-cal-memo-wrap"></div>

<!-- 일일 체크리스트 -->
<div class="checklist-wrap">
  <div class="checklist-items" id="checklist-items"></div>
  <div class="checklist-input-row">
    <input class="checklist-input" id="checklist-input" placeholder="할 일 추가..." maxlength="60">
    <button class="checklist-add-btn" onclick="addCheckItem()">+ 추가</button>
  </div>
</div>

<div class="items" id="items-container"></div>
<button class="reset-btn" onclick="confirmReset()">이번 주 초기화</button>

<!-- 시간 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3 id="modal-title">시간 추가</h3>
    <div class="modal-inputs">
      <input class="modal-input" type="number" id="input-h" min="0" max="23" placeholder="시">
      <span class="modal-sep">:</span>
      <input class="modal-input" type="number" id="input-m" min="0" max="59" placeholder="분">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmManual()">추가</button>
    </div>
  </div>
</div>

<!-- 달력 모달 -->
<div class="cal-overlay" id="cal-overlay" onclick="closeCalOutside(event)">
  <div class="cal-modal" id="cal-modal">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="shiftCalMonth(-1)">‹</button>
      <span class="cal-title" id="cal-title"></span>
      <button class="cal-nav-btn" onclick="shiftCalMonth(1)">›</button>
      <button class="cal-memo-add-btn" onclick="openCalMemo(null)" title="메모 추가">+</button>
      <button class="cal-close" onclick="closeCal()">✕</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<!-- 달력 메모 입력 팝업 -->
<div class="cal-memo-overlay" id="cal-memo-overlay" onclick="closeCalMemoOutside(event)">
  <div class="cal-memo-modal">
    <div class="cal-memo-header">
      <span class="cal-memo-title" id="cal-memo-title"></span>
      <button class="cal-memo-close" onclick="closeCalMemo()">✕</button>
    </div>
    <textarea class="cal-memo-textarea" id="cal-memo-textarea" placeholder="이 날의 메모를 입력하세요..."></textarea>
    <div class="cal-memo-btns">
      <button class="cal-memo-cancel" onclick="closeCalMemo()">취소</button>
      <button class="cal-memo-del" id="cal-memo-del" onclick="deleteCalMemo()" style="display:none">삭제</button>
      <button class="cal-memo-save" onclick="saveCalMemo()">저장</button>
    </div>
  </div>
</div>

<script>
const ITEMS = [
  { id:'aipot', name:'블렌더',            color:'#34d399', goalMin:1200, memo:true  },
  { id:'aicha', name:'명리학',            color:'#fb7185', goalMin:450,  memo:true  },
  { id:'book',  name:'독서',              color:'#60a5fa', goalMin:270,  memo:true  },
  { id:'study', name:'일본어 / 파이썬',   color:'#a78bfa', goalMin:180,  memo:true  },
  { id:'gym',   name:'헬스',              color:'#f97316', goalMin:180,  memo:false },
];

const HOLIDAYS = new Set([
  '0101','0301','0505','0606','0815','1003','1009','1225',
  '20250128','20250129','20250130','20250506',
  '20250906','20250907','20250908',
  '20260216','20260217','20260218','20260524',
  '20260924','20260925','20260926',
  '20240209','20240210','20240212','20240515',
  '20240916','20240917','20240918',
]);

function isHoliday(date) {
  const d = new Date(date);
  if (d.getDay() === 0) return true;
  const full = d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  const mmdd = String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  return HOLIDAYS.has(full) || HOLIDAYS.has(mmdd);
}

let weekOffset = 0;

function updateCalBtn() {
  const n = new Date();
  const mm = String(n.getMonth()+1).padStart(2,'0');
  const dd = String(n.getDate()).padStart(2,'0');
  document.getElementById('cal-btn-date').textContent = mm + dd;
}

function getMonday(offset) {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay() + 1 + (offset||0)*7);
  return d;
}

function getWeekKey(offset) {
  const d = getMonday(offset);
  return 'week_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}

function getWeekKeyForMonday(mon) {
  return 'week_'+mon.getFullYear()+String(mon.getMonth()+1).padStart(2,'0')+String(mon.getDate()).padStart(2,'0');
}

function getSundayOfDate(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function getMondayOfDate(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d;
}

function getWeekLabel(offset) {
  if (offset===0) return '이번 주';
  if (offset===-1) return '지난 주';
  if (offset===1) return '다음 주';
  const d = getMonday(offset);
  return (d.getMonth()+1)+'월 '+d.getDate()+'일~';
}

function changeWeek(dir) {
  weekOffset += dir;
  document.getElementById('week-label').textContent = getWeekLabel(weekOffset);
  render();
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(getWeekKey(weekOffset)))||{}; } catch(e) { return {}; }
}
function saveData(data) {
  try { localStorage.setItem(getWeekKey(weekOffset), JSON.stringify(data)); } catch(e) {}
}
function loadDataForKey(key) {
  try { return JSON.parse(localStorage.getItem(key))||{}; } catch(e) { return {}; }
}
function getMin(id) { return loadData()[id]||0; }
function addMin(id, m) {
  const data = loadData();
  data[id] = Math.max(0,(data[id]||0)+m);
  saveData(data);
}
function getMemo(id) { return loadData()['memo_'+id]||''; }
function saveMemo(id, text) {
  const data = loadData();
  data['memo_'+id] = text;
  saveData(data);
}

// ── 달력 날짜별 메모 ──
function dateToKey(date) {
  const d = new Date(date);
  return 'calmemo_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}
function getCalMemo(date) {
  try { return localStorage.getItem(dateToKey(date)) || ''; } catch(e) { return ''; }
}
function setCalMemo(date, text) {
  try {
    if (text.trim()) localStorage.setItem(dateToKey(date), text);
    else localStorage.removeItem(dateToKey(date));
  } catch(e) {}
}

// 오늘 달력 메모 미리보기
function renderTodayCalMemo() {
  const today = new Date();
  const memo = getCalMemo(today);
  const wrap = document.getElementById('today-cal-memo-wrap');
  if (memo) {
    wrap.innerHTML = '<div class="today-cal-memo"><div class="today-cal-memo-text">📝 ' + memo + '</div></div>';
  } else {
    wrap.innerHTML = '';
  }
}

// 달력 메모 입력 팝업
let calMemoDate = null;

function openCalMemo(date) {
  // date가 null이면 오늘
  calMemoDate = date || new Date();
  const d = calMemoDate;
  const label = d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';
  document.getElementById('cal-memo-title').textContent = label;
  const existing = getCalMemo(d);
  document.getElementById('cal-memo-textarea').value = existing;
  document.getElementById('cal-memo-del').style.display = existing ? 'block' : 'none';
  document.getElementById('cal-memo-overlay').classList.add('open');
  setTimeout(() => document.getElementById('cal-memo-textarea').focus(), 200);
}

function closeCalMemo() {
  document.getElementById('cal-memo-overlay').classList.remove('open');
  calMemoDate = null;
}

function closeCalMemoOutside(e) {
  if (e.target === document.getElementById('cal-memo-overlay')) closeCalMemo();
}

function saveCalMemo() {
  const text = document.getElementById('cal-memo-textarea').value.trim();
  setCalMemo(calMemoDate, text);
  closeCalMemo();
  renderCal();
  renderTodayCalMemo();
}

function deleteCalMemo() {
  setCalMemo(calMemoDate, '');
  closeCalMemo();
  renderCal();
  renderTodayCalMemo();
}

// 타이머
const timers = {};

function fmtTime(min) {
  const h=Math.floor(min/60), m=min%60;
  return h>0 ? h+'h '+m+'m' : m+'m';
}
function fmtSec(sec) {
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  if(h>0) return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function startTimer(id) {
  if(timers[id]) return;
  timers[id]={startTs:Date.now(),accSec:0};
  timers[id].interval=setInterval(()=>{
    timers[id].accSec=Math.floor((Date.now()-timers[id].startTs)/1000);
    const el=document.getElementById('timer-'+id);
    if(el) el.textContent='⏱ '+fmtSec(timers[id].accSec);
  },1000);
}

function stopTimer(id) {
  if(!timers[id]) return;
  clearInterval(timers[id].interval);
  const elapsed=Math.round(timers[id].accSec/60);
  if(elapsed>0){addMin(id,elapsed);render();}
  delete timers[id];
}

function toggleTimer(id) {
  if(timers[id]){stopTimer(id);}
  else{
    startTimer(id);
    const el=document.getElementById('timer-'+id);
    if(el){el.classList.add('active');el.style.display='block';}
  }
  updateTimerBtn(id);
}

function updateTimerBtn(id) {
  const btn=document.getElementById('tbtn-'+id);
  const display=document.getElementById('timer-'+id);
  if(!btn) return;
  const item=ITEMS.find(i=>i.id===id);
  if(timers[id]){
    btn.textContent='⏹'; btn.classList.add('running'); btn.style.color=item.color;
    if(display){display.classList.add('active');display.style.display='block';}
  } else {
    btn.textContent='▶'; btn.classList.remove('running'); btn.style.color='';
    if(display){display.classList.remove('active');display.style.display='none';display.textContent='';}
  }
}

let modalItemId=null, modalMode='add';

function openModal(id,mode){
  modalItemId=id; modalMode=mode||'add';
  const item=ITEMS.find(i=>i.id===id);
  document.getElementById('modal-title').textContent=modalMode==='add'?item.name+' — 시간 추가':item.name+' — 시간 빼기';
  document.getElementById('input-h').value='';
  document.getElementById('input-m').value='';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('input-m').focus(),200);
}
function closeModal(){document.getElementById('modal').classList.remove('open');modalItemId=null;}
function closeModalOutside(e){if(e.target===document.getElementById('modal'))closeModal();}
function confirmManual(){
  const h=parseInt(document.getElementById('input-h').value)||0;
  const m=parseInt(document.getElementById('input-m').value)||0;
  const total=h*60+m;
  if(total>0&&modalItemId){addMin(modalItemId,modalMode==='add'?total:-total);render();}
  closeModal();
}
function confirmReset(){if(confirm('이번 주 기록을 모두 초기화할까요?')){saveData({});render();}}

// ── 달력 ──
let calYear, calMonth;

function openCal(){
  const now=new Date(); calYear=now.getFullYear(); calMonth=now.getMonth();
  renderCal();
  document.getElementById('cal-overlay').classList.add('open');
}
function closeCal(){document.getElementById('cal-overlay').classList.remove('open');}
function closeCalOutside(e){if(e.target===document.getElementById('cal-overlay'))closeCal();}

function shiftCalMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  const now=new Date();
  const minY=now.getFullYear()-1, minM=now.getMonth();
  const maxY=now.getFullYear()+1, maxM=now.getMonth();
  if(calYear<minY||(calYear===minY&&calMonth<minM)){calYear=minY;calMonth=minM;}
  if(calYear>maxY||(calYear===maxY&&calMonth>maxM)){calYear=maxY;calMonth=maxM;}
  renderCal();
}

function renderCal(){
  document.getElementById('cal-title').textContent=calYear+'년 '+(calMonth+1)+'월';
  const today=new Date(); today.setHours(0,0,0,0);
  const firstDayOfMonth=new Date(calYear,calMonth,1);
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const curMon=getMonday(weekOffset);
  const curSun=new Date(curMon); curSun.setDate(curSun.getDate()+6);

  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';

  ['일','월','화','수','목','금','토'].forEach((l,i)=>{
    const el=document.createElement('div');
    el.className='cal-day-label'+(i===0?' holiday':'');
    el.textContent=l;
    grid.appendChild(el);
  });

  const firstSun=getSundayOfDate(firstDayOfMonth);
  const lastDayOfMonth=new Date(calYear,calMonth,daysInMonth);
  const lastSun=getSundayOfDate(lastDayOfMonth);

  const cur=new Date(firstSun);
  while(cur<=lastSun){
    const sun=new Date(cur);
    const mon=new Date(cur); mon.setDate(mon.getDate()+1);
    const wKey=getWeekKeyForMonday(mon);
    const wData=loadDataForKey(wKey);

    for(let w=0;w<7;w++){
      const cellDate=new Date(sun); cellDate.setDate(cellDate.getDate()+w);
      const cell=document.createElement('div');
      cell.className='cal-cell';

      if(cellDate.getMonth()===calMonth && cellDate.getFullYear()===calYear){
        if(cellDate>=curMon&&cellDate<=curSun) cell.classList.add('in-week');
        if(cellDate.getTime()===today.getTime()) cell.classList.add('today');
        if(isHoliday(cellDate)) cell.classList.add('holiday');
        const hasMemo = !!getCalMemo(cellDate);
        if(hasMemo) cell.classList.add('has-memo');

        const numEl=document.createElement('div');
        numEl.className='cal-num';
        numEl.textContent=cellDate.getDate();
        cell.appendChild(numEl);

        const captured=new Date(cellDate);
        cell.addEventListener('click', ()=>openCalMemo(captured));
      }
      grid.appendChild(cell);
    }

    const barsEl=document.createElement('div');
    barsEl.className='cal-week-bars';
    ITEMS.forEach(item=>{
      const min=wData[item.id]||0;
      const pct=Math.min(100,Math.round((min/item.goalMin)*100));
      const rowEl=document.createElement('div');
      rowEl.className='cal-bar-row';
      if(pct>0){
        const fillEl=document.createElement('div');
        fillEl.className='cal-bar-fill';
        fillEl.style.width=pct+'%';
        fillEl.style.background=item.color;
        fillEl.style.opacity='0.75';
        rowEl.appendChild(fillEl);
      }
      barsEl.appendChild(rowEl);
    });
    grid.appendChild(barsEl);
    cur.setDate(cur.getDate()+7);
  }
}

(function(){
  let startX=0;
  const el=document.getElementById('cal-modal');
  el.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{
    const diff=e.changedTouches[0].clientX-startX;
    if(Math.abs(diff)>50) shiftCalMonth(diff<0?1:-1);
  },{passive:true});
})();

// 렌더
function render(){
  const container=document.getElementById('items-container');
  container.innerHTML='';
  ITEMS.forEach(item=>{
    const min=getMin(item.id);
    const pct=Math.min(100,Math.round((min/item.goalMin)*100));
    const isRunning=!!timers[item.id];
    const memo=getMemo(item.id);
    const card=document.createElement('div');
    card.className='item-card'; card.dataset.id=item.id;
    const memoHtml=item.memo
      ?'<textarea class="item-memo" placeholder="이번 주 메모..." onchange="saveMemo(\''+item.id+'\',this.value)" onblur="saveMemo(\''+item.id+'\',this.value)">'+memo+'</textarea>'
      :'';
    card.innerHTML=
      '<div class="item-header">'+
        '<div class="dot" style="background:'+item.color+'"></div>'+
        '<span class="item-name">'+item.name+'</span>'+
        '<span class="item-time">'+fmtTime(min)+' / '+fmtTime(item.goalMin)+'</span>'+
      '</div>'+
      '<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+item.color+'"></div></div>'+
      memoHtml+
      '<div class="item-meta">'+
        '<span class="goal-label">달성률 '+pct+'%</span>'+
        '<span class="goal-label" style="color:'+(pct>=100?item.color:'')+'">'+
          (pct>=100?'✓ 완료':'목표 '+fmtTime(item.goalMin))+
        '</span>'+
      '</div>'+
      '<div class="item-actions">'+
        '<span class="timer-live'+(isRunning?' active':'')+'" id="timer-'+item.id+'" style="'+(isRunning?'':'display:none;')+'">'+(isRunning?'⏱ '+fmtSec(timers[item.id].accSec):'')+'</span>'+
        '<button class="btn btn-timer'+(isRunning?' running':'')+'" id="tbtn-'+item.id+'" style="color:'+(isRunning?item.color:'')+'" onclick="toggleTimer(\''+item.id+'\')">'+(isRunning?'⏹':'▶')+'</button>'+
        '<button class="btn btn-add" onclick="openModal(\''+item.id+'\',\'add\')">+</button>'+
        '<button class="btn btn-minus" onclick="openModal(\''+item.id+'\',\'sub\')">−</button>'+
      '</div>';
    container.appendChild(card);
  });
}

// 체크리스트
const CHECKLIST_KEY = 'checklist_persistent';
function loadChecklist() {
  try { return JSON.parse(localStorage.getItem(CHECKLIST_KEY)) || []; } catch(e) { return []; }
}
function saveChecklist(items) {
  try { localStorage.setItem(CHECKLIST_KEY, JSON.stringify(items)); } catch(e) {}
}

function renderChecklist() {
  const items = loadChecklist();
  const container = document.getElementById('checklist-items');
  container.innerHTML = '';
  items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'check-row';
    row.innerHTML =
      '<input type="checkbox" class="check-box" '+(item.done?'checked':'')+' onchange="toggleCheck('+idx+', this.checked)">'+
      '<span class="check-label'+(item.done?' done':'')+'" onclick="toggleCheck('+idx+', '+(item.done?'false':'true')+')">'+item.text+'</span>'+
      '<button class="check-delete" onclick="deleteCheck('+idx+')">✕</button>';
    container.appendChild(row);
  });
}

function addCheckItem() {
  const input = document.getElementById('checklist-input');
  const text = input.value.trim();
  if (!text) return;
  const items = loadChecklist();
  items.push({ text, done: false });
  saveChecklist(items);
  input.value = '';
  renderChecklist();
}

function toggleCheck(idx, done) {
  const items = loadChecklist();
  if (items[idx]) { items[idx].done = done; saveChecklist(items); renderChecklist(); }
}

function deleteCheck(idx) {
  const items = loadChecklist();
  items.splice(idx, 1);
  saveChecklist(items);
  renderChecklist();
}

document.getElementById('checklist-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCheckItem();
});

document.getElementById('week-label').textContent=getWeekLabel(0);
updateCalBtn();
renderTodayCalMemo();
renderChecklist();
render();

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open')) confirmManual();
  if(e.key==='Enter'&&document.getElementById('cal-memo-overlay').classList.contains('open')&&e.metaKey) saveCalMemo();
});

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="주간 루틴">
<title>주간 루틴 트래커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 16px;
    padding-top: calc(16px + env(safe-area-inset-top));
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .items { display: flex; flex-direction: column; gap: 10px; }

  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .item-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 8px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .item-name { font-size: 14px; font-weight: 500; flex: 1; }

  .item-time {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .bar-wrap {
    margin: 4px 14px 8px;
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .item-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px 10px;
  }

  .goal-label { font-size: 11px; color: var(--text-dim); }

  .item-actions {
    display: flex;
    gap: 6px;
    padding: 0 14px 12px;
  }

  .btn {
    flex: 1;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    cursor: pointer;
    padding: 7px 0;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }

  .btn-timer {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-timer.running { border-color: currentColor; }

  .btn-add {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-minus {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    flex: 0 0 38px;
  }

  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-align: center;
    color: var(--text-dim);
    padding-bottom: 4px;
    display: none;
  }
  .timer-display.active { display: block; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 480px;
    transform: translateY(30px);
    transition: transform 0.25s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h3 { font-size: 14px; font-weight: 500; margin-bottom: 16px; color: var(--text); }

  .modal-inputs {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
  }

  .modal-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 10px 12px;
    text-align: center;
    width: 60px;
    outline: none;
  }
  .modal-input:focus { border-color: #555; }
  .modal-sep { color: var(--text-dim); font-size: 18px; }
  .modal-btns { display: flex; gap: 8px; }

  .btn-confirm {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: var(--text);
    color: var(--bg);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }
  .btn-cancel {
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  .reset-btn {
    display: block;
    margin: 20px auto 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
  }

  .week-nav { display: flex; align-items: center; gap: 10px; }
  .week-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 26px; height: 26px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<header>
  <h1>주간 루틴</h1>
  <div class="week-nav">
    <button class="week-btn" onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="week-label">이번 주</span>
    <button class="week-btn" onclick="changeWeek(1)">›</button>
  </div>
</header>

<div class="items" id="items-container"></div>
<button class="reset-btn" onclick="confirmReset()">이번 주 초기화</button>

<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3 id="modal-title">시간 추가</h3>
    <div class="modal-inputs">
      <input class="modal-input" type="number" id="input-h" min="0" max="23" placeholder="시">
      <span class="modal-sep">:</span>
      <input class="modal-input" type="number" id="input-m" min="0" max="59" placeholder="분">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmManual()">추가</button>
    </div>
  </div>
</div>

<script>
const ITEMS = [
  { id: 'book',  name: '독서',             color: '#60a5fa', goalMin: 300 },
  { id: 'gym',   name: '헬스',             color: '#f97316', goalMin: 180 },
  { id: 'study', name: '일본어 / 파이썬',   color: '#a78bfa', goalMin: 240 },
  { id: 'aipot', name: 'AI-POT / 명리학',  color: '#34d399', goalMin: 600 },
  { id: 'aicha', name: 'AI cha / 정보수집', color: '#fb7185', goalMin: 600 },
];

let weekOffset = 0;

function getWeekKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + 1 + (offset||0) * 7);
  return 'week_' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

function getWeekLabel(offset) {
  if (offset === 0) return '이번 주';
  if (offset === -1) return '지난 주';
  if (offset === 1) return '다음 주';
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + 1 + offset * 7);
  return (d.getMonth()+1) + '월 ' + d.getDate() + '일~';
}

function changeWeek(dir) {
  weekOffset += dir;
  document.getElementById('week-label').textContent = getWeekLabel(weekOffset);
  render();
}

// localStorage 저장/로드
function loadData() {
  try { return JSON.parse(localStorage.getItem(getWeekKey(weekOffset))) || {}; }
  catch(e) { return {}; }
}
function saveData(data) {
  try { localStorage.setItem(getWeekKey(weekOffset), JSON.stringify(data)); } catch(e) {}
}
function getMin(id) { return loadData()[id] || 0; }
function addMin(id, m) {
  const data = loadData();
  data[id] = Math.max(0, (data[id] || 0) + m);
  saveData(data);
}

// 타이머
const timers = {};

function fmtTime(min) {
  const h = Math.floor(min/60), m = min%60;
  return h > 0 ? h+'h '+m+'m' : m+'m';
}
function fmtSec(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h > 0) return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function startTimer(id) {
  if (timers[id]) return;
  timers[id] = { startTs: Date.now(), accSec: 0 };
  timers[id].interval = setInterval(() => {
    timers[id].accSec = Math.floor((Date.now() - timers[id].startTs) / 1000);
    const el = document.getElementById('timer-'+id);
    if (el) el.textContent = '⏱ ' + fmtSec(timers[id].accSec);
  }, 1000);
}

function stopTimer(id) {
  if (!timers[id]) return;
  clearInterval(timers[id].interval);
  const elapsed = Math.round(timers[id].accSec / 60);
  if (elapsed > 0) { addMin(id, elapsed); render(); }
  delete timers[id];
}

function toggleTimer(id) {
  if (timers[id]) { stopTimer(id); }
  else {
    startTimer(id);
    const el = document.getElementById('timer-'+id);
    if (el) el.classList.add('active');
  }
  updateTimerBtn(id);
}

function updateTimerBtn(id) {
  const btn = document.getElementById('tbtn-'+id);
  const display = document.getElementById('timer-'+id);
  if (!btn) return;
  const item = ITEMS.find(i => i.id === id);
  if (timers[id]) {
    btn.textContent = '⏹ 정지';
    btn.classList.add('running');
    btn.style.color = item.color;
    display.classList.add('active');
  } else {
    btn.textContent = '▶ 타이머';
    btn.classList.remove('running');
    btn.style.color = '';
    display.classList.remove('active');
    display.textContent = '';
  }
}

// 모달
let modalItemId = null, modalMode = 'add';

function openModal(id, mode) {
  modalItemId = id; modalMode = mode || 'add';
  const item = ITEMS.find(i => i.id === id);
  document.getElementById('modal-title').textContent =
    modalMode === 'add' ? item.name + ' — 시간 추가' : item.name + ' — 시간 빼기';
  document.getElementById('input-h').value = '';
  document.getElementById('input-m').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('input-m').focus(), 200);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalItemId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function confirmManual() {
  const h = parseInt(document.getElementById('input-h').value) || 0;
  const m = parseInt(document.getElementById('input-m').value) || 0;
  const total = h * 60 + m;
  if (total > 0 && modalItemId) {
    addMin(modalItemId, modalMode === 'add' ? total : -total);
    render();
  }
  closeModal();
}

function confirmReset() {
  if (confirm('이번 주 기록을 모두 초기화할까요?')) { saveData({}); render(); }
}

// 렌더
function render() {
  const container = document.getElementById('items-container');
  container.innerHTML = '';
  ITEMS.forEach(item => {
    const min = getMin(item.id);
    const pct = Math.min(100, Math.round((min / item.goalMin) * 100));
    const isRunning = !!timers[item.id];
    const card = document.createElement('div');
    card.className = 'item-card';
    card.dataset.id = item.id;
    card.innerHTML =
      '<div class="item-header">' +
        '<div class="dot" style="background:'+item.color+'"></div>' +
        '<span class="item-name">'+item.name+'</span>' +
        '<span class="item-time">'+fmtTime(min)+' / '+fmtTime(item.goalMin)+'</span>' +
      '</div>' +
      '<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+item.color+'"></div></div>' +
      '<div class="item-meta">' +
        '<span class="goal-label">달성률 '+pct+'%</span>' +
        '<span class="goal-label" style="color:'+(pct>=100?item.color:'')+'">'+
          (pct>=100 ? '✓ 완료' : '목표 '+fmtTime(item.goalMin))+
        '</span>' +
      '</div>' +
      '<div class="timer-display'+(isRunning?' active':'')+'" id="timer-'+item.id+'">'+(isRunning?'⏱ '+fmtSec(timers[item.id].accSec):'')+'</div>' +
      '<div class="item-actions">' +
        '<button class="btn btn-timer'+(isRunning?' running':'')+'" id="tbtn-'+item.id+'" style="color:'+(isRunning?item.color:'')+'" onclick="toggleTimer(\''+item.id+'\')">'+(isRunning?'⏹ 정지':'▶ 타이머')+'</button>' +
        '<button class="btn btn-add" onclick="openModal(\''+item.id+'\',\'add\')">+ 직접입력</button>' +
        '<button class="btn btn-minus" onclick="openModal(\''+item.id+'\',\'sub\')">−</button>' +
      '</div>';
    container.appendChild(card);
  });
}

document.getElementById('week-label').textContent = getWeekLabel(0);
render();

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) confirmManual();
});
</script>
</body>
</html>
